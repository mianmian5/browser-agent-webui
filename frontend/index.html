<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Agent WebUI</title>
<style>
  :root {
    --bg: #0a0a10;
    --surface: #14141f;
    --surface-2: #1e1e32;
    --border: #2a2a45;
    --text: #e8e8f0;
    --text-sec: #7b7f9b;
    --accent: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --warning: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  header {
    padding: 0 1.5rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .logo span { color: var(--accent); }
  .status { font-size: 12px; color: var(--text-sec); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-sec); display: inline-block; }
  .status-dot.active { background: var(--green); animation: pulse 1.5s infinite; }
  .status-dot.warning { background: var(--warning); }
  .status-dot.error-dot { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Browser viewport */
  .viewport {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .viewport-header {
    padding: 0.5rem 1rem; font-size: 11px;
    color: var(--text-sec); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
  }
  .viewport-url {
    flex: 1; padding: 4px 8px; border-radius: 4px;
    background: var(--surface-2); font-size: 11px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: 'SF Mono', 'JetBrains Mono', monospace;
  }
  .viewport-screen {
    flex: 1; position: relative; overflow: hidden;
    background: var(--surface-2);
  }
  .viewport-screen img {
    width: 100%; height: 100%; object-fit: contain;
    display: block;
  }
  .viewport-screen .placeholder {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 16px;
    color: var(--text-sec); font-size: 14px;
  }
  .viewport-screen .placeholder .big { font-size: 48px; }

  /* Side panel */
  .side {
    width: 400px; display: flex; flex-direction: column;
    background: var(--surface);
  }
  .side-header {
    padding: 0.75rem 1rem; font-size: 12px; font-weight: 600;
    color: var(--text-sec); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .clear-btn {
    background: none; border: 1px solid var(--border); color: var(--text-sec);
    padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  .thinking-log {
    flex: 1; overflow-y: auto; padding: 0.75rem;
    display: flex; flex-direction: column; gap: 8px;
  }
  .log-entry {
    padding: 8px 10px; border-radius: 8px;
    background: var(--surface-2); font-size: 12px;
    border-left: 3px solid var(--accent);
  }
  .log-entry .thought { color: var(--text); line-height: 1.6; margin-bottom: 4px; }
  .log-entry .action {
    color: var(--text-sec); font-size: 11px;
    font-family: 'SF Mono', monospace;
  }
  .log-entry .obs {
    color: var(--accent); font-size: 11px;
    margin-top: 4px; word-break: break-all;
  }
  .log-entry.error { border-left-color: var(--red); }
  .log-entry.warning-entry { border-left-color: var(--warning); }

  /* Input area */
  .input-area {
    padding: 0.75rem 1rem; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--surface);
  }
  .input-area textarea {
    flex: 1; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-size: 13px; resize: none; outline: none; font-family: inherit;
    min-height: 40px; max-height: 100px; line-height: 1.5;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-sec); }
  .btn-run {
    padding: 10px 20px; border: none; border-radius: 8px;
    background: var(--accent); color: white; font-weight: 600;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-run:hover { opacity: 0.9; }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-run.used { background: var(--warning); }
  .btn-stop { background: var(--red); }

  /* Settings */
  .settings-bar {
    padding: 0.5rem 1rem; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap;
    background: var(--surface); font-size: 12px;
  }
  .settings-bar input, .settings-bar select {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 8px; color: var(--text);
    font-size: 11px; outline: none; font-family: inherit;
  }
  .settings-bar input:focus, .settings-bar select:focus { border-color: var(--accent); }
  .settings-bar label { color: var(--text-sec); white-space: nowrap; }
  .free-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(34,197,94,0.15); color: var(--green);
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    font-weight: 600;
  }
  .free-badge.exhausted {
    background: rgba(239,68,68,0.15); color: var(--red);
  }
  .hint-text {
    font-size: 10px; color: var(--text-sec);
    margin-top: 2px;
  }

  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .side { width: 100%; max-height: 40vh; }
    .viewport-screen { min-height: 40vh; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">🌐 <span>Browser Agent</span> <span style="font-weight:400;font-size:12px;color:var(--text-sec)">WebUI</span></div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
      <span class="free-badge" id="freeBadge">🎁 免费 5/5</span>
    </div>
  </header>

  <!-- Settings -->
    <div style="padding:2px 1rem;background:var(--surface);font-size:10px;color:var(--text-sec);display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);">
    <span>🔒 你的 API Key 仅用于本次请求，直接传到模型端，我们<strong>不会存储</strong>也<strong>看不到</strong>你的 Key</span>
  </div>
<div class="settings-bar">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="留空 = 免费试用（限5次）" style="width:220px" />
    <label>Model</label>
    <select id="model">
      <option value="deepseek-chat">DeepSeek V3（默认）</option>
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
      <option value="qwen-plus">Qwen Plus</option>
    </select>
  </div>

  <div class="main">
    <!-- Browser viewport -->
    <div class="viewport">
      <div class="viewport-header">
        <span>📍</span>
        <span class="viewport-url" id="currentUrl">about:blank</span>
      </div>
      <div class="viewport-screen" id="viewportScreen">
        <div class="placeholder" id="placeholder">
          <div class="big">🌐</div>
          <div>输入任务，点击运行</div>
          <div style="font-size:12px">Agent 将操控浏览器完成任务</div>
        </div>
        <img id="screenshotImg" style="display:none" />
      </div>
    </div>

    <!-- Side panel -->
    <div class="side">
      <div class="side-header">
        <span>🧠 Agent Thinking</span>
        <button class="clear-btn" onclick="clearLog()">Clear</button>
      </div>
      <div class="thinking-log" id="thinkingLog"></div>

      <div class="input-area">
        <textarea id="taskInput" rows="2"
          placeholder='例如：帮我搜索"2024年诺贝尔奖获得者"并整理成列表...'
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();runTask()}"></textarea>
        <button class="btn-run" id="runBtn" onclick="runTask()">▶ Run</button>
        <button class="btn-run btn-stop" id="stopBtn" onclick="stopTask()" style="display:none">■ Stop</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Model → Base URL 映射 ──────────────────
  const MODEL_BASE_URLS = {
    'gpt-4o':             'https://api.openai.com/v1',
    'gpt-4o-mini':        'https://api.openai.com/v1',
    'claude-sonnet-4-20250514': 'https://api.anthropic.com/v1',
    'deepseek-chat':      'https://api.deepseek.com/v1',
    'qwen-plus':          'https://dashscope.aliyuncs.com/compatible-mode/v1',
  };

  // ── State ────────────────────────────────────────
  let sessionId = null;
  let isRunning = false;
  let eventSource = null;
  let freeRemaining = 5;

  // ── DOM refs ─────────────────────────────────────
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const freeBadge = document.getElementById('freeBadge');
  const viewportScreen = document.getElementById('viewportScreen');
  const placeholder = document.getElementById('placeholder');
  const screenshotImg = document.getElementById('screenshotImg');
  const currentUrl = document.getElementById('currentUrl');
  const thinkingLog = document.getElementById('thinkingLog');
  const taskInput = document.getElementById('taskInput');
  const runBtn = document.getElementById('runBtn');
  const apiKeyInput = document.getElementById('apiKey');
  const modelSelect = document.getElementById('model');

  // ── Load saved config ────────────────────────────
  try {
    const saved = JSON.parse(localStorage.getItem('browserAgentConfig') || '{}');
    if (saved.apiKey) apiKeyInput.value = saved.apiKey;
    if (saved.model) modelSelect.value = saved.model;
  } catch(e) {}

  function saveConfig() {
    localStorage.setItem('browserAgentConfig', JSON.stringify({
      apiKey: apiKeyInput.value,
      model: modelSelect.value,
    }));
  }

  // 切换模型时自动更新提示
  modelSelect.addEventListener('change', () => {
    const model = modelSelect.value;
    const url = MODEL_BASE_URLS[model] || 'https://api.deepseek.com/v1';
    // 保存配置
    saveConfig();
    // 如果没填 Key，提示是否免费
    updateFreeHint();
  });

  apiKeyInput.addEventListener('input', updateFreeHint);

  function updateFreeHint() {
    const hasKey = apiKeyInput.value.trim().length > 0;
    if (hasKey) {
      freeBadge.textContent = '🔑 使用自己的 Key';
      freeBadge.className = 'free-badge';
    } else {
      freeBadge.textContent = `🎁 免费 ${freeRemaining}/5`;
      freeBadge.className = 'free-badge' + (freeRemaining <= 0 ? ' exhausted' : '');
    }
  }

  // ── 查询剩余次数 ──────────────────────────────
  async function checkFreeRemaining() {
    try {
      const res = await fetch('/browser-agent/api/rate-limit');
      if (res.ok) {
        const data = await res.json();
        freeRemaining = data.remaining || 0;
        updateFreeHint();
        if (freeRemaining <= 0 && !apiKeyInput.value.trim()) {
          addLog({
            type: 'warning',
            thought: '⚠️ 免费试用次数已用完！请在上方输入你的 API Key 继续使用。'
          });
        }
      }
    } catch(e) {
      // silently ignore
    }
  }

  // ── Status ───────────────────────────────────────
  function setStatus(text, active, type) {
    statusText.textContent = text;
    statusDot.className = 'status-dot';
    if (active) {
      if (type === 'error') statusDot.className += ' error-dot';
      else if (type === 'warning') statusDot.className += ' warning';
      else statusDot.className += ' active';
    }
  }

  // ── Add log entry ────────────────────────────────
  function addLog(data) {
    const el = document.createElement('div');
    el.className = 'log-entry';
    if (data.type === 'error') el.className += ' error';
    if (data.type === 'warning') el.className += ' warning-entry';

    if (data.thought) {
      const thought = document.createElement('div');
      thought.className = 'thought';
      thought.textContent = (data.type === 'error' ? '❌ ' : data.type === 'warning' ? '⚠️ ' : '💭 ') + data.thought;
      el.appendChild(thought);
    }

    if (data.action && data.action !== 'done') {
      const action = document.createElement('div');
      action.className = 'action';
      action.textContent = '🔧 ' + data.action + ' ' + JSON.stringify(data.params || {});
      el.appendChild(action);
    }

    if (data.observation) {
      const obs = document.createElement('div');
      obs.className = 'obs';
      obs.textContent = '📌 ' + data.observation.slice(0, 300);
      el.appendChild(obs);
    }

    thinkingLog.appendChild(el);
    thinkingLog.scrollTop = thinkingLog.scrollHeight;
  }

  function clearLog() {
    thinkingLog.innerHTML = '';
  }

  // ── Update screenshot ────────────────────────────
  function updateScreenshot(base64Data) {
    if (base64Data) {
      screenshotImg.src = 'data:image/png;base64,' + base64Data;
      screenshotImg.style.display = 'block';
      placeholder.style.display = 'none';
    }
  }

  // ── Run task ────────────────────────────────────
  async function runTask() {
    const task = taskInput.value.trim();
    if (!task || isRunning) return;

    saveConfig();

    const apiKey = apiKeyInput.value.trim();

    // Clear previous
    clearLog();
    placeholder.style.display = 'flex';
    screenshotImg.style.display = 'none';
    currentUrl.textContent = 'starting...';

    isRunning = true;
    runBtn.disabled = true;
    runBtn.textContent = '⏳ Running...';
    setStatus('Starting...', true);

    try {
      const model = modelSelect.value;
      const baseUrl = MODEL_BASE_URLS[model] || 'https://api.deepseek.com/v1';

      // Start agent
      const startRes = await fetch('/browser-agent/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          task: task,
          api_key: apiKey,
          base_url: baseUrl,
          model: model,
          headless: true,
        }),
      });

      // 检查 HTTP 错误状态
      if (!startRes.ok) {
        let errMsg = '请求失败';
        try {
          const errData = await startRes.json();
          if (errData.detail) {
            if (typeof errData.detail === 'object' && errData.detail.message) {
              errMsg = errData.detail.message;
            } else if (typeof errData.detail === 'string') {
              errMsg = errData.detail;
            }
          }
        } catch(e) {
          // 非 JSON 响应，显示状态码
          errMsg = `服务器错误 (${startRes.status})`;
        }
        addLog({ type: 'error', thought: errMsg });
        finishRun();
        return;
      }

      const startData = await startRes.json();
      sessionId = startData.session_id;

      // 更新剩余次数
      if (startData.remaining_free !== undefined) {
        freeRemaining = startData.remaining_free;
        updateFreeHint();
      }

      if (!apiKey) {
        addLog({ thought: `🎁 免费试用（剩余 ${freeRemaining} 次）任务已启动: "${task}"` });
      } else {
        addLog({ thought: `任务已启动: "${task}"` });
      }
      setStatus('Running...', true);

      // Connect to SSE stream
      eventSource = new EventSource(`/browser-agent/api/stream/${sessionId}`);

      eventSource.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch(e) {
          return;
        }

        if (data.type === 'done') {
          finishRun();
          return;
        }

        if (data.type === 'error') {
          addLog({ type: 'error', thought: data.content || '未知错误' });
          return;
        }

        // Update screenshot
        if (data.screenshot) {
          updateScreenshot(data.screenshot);
        }

        // Update URL
        if (data.observation && data.observation.startsWith('已导航到:')) {
          currentUrl.textContent = data.observation.replace('已导航到: ', '');
        }

        // Add to log
        addLog(data);

        if (data.done) {
          addLog({ thought: '✅ ' + (data.observation || '任务完成！') });
          finishRun();
        }
      };

      eventSource.onerror = () => {
        // 检查剩余次数
        checkFreeRemaining();
        addLog({ type: 'error', thought: '⚠️ 连接已断开' });
        finishRun();
      };

    } catch (err) {
      addLog({ type: 'error', thought: '启动失败: ' + err.message });
      finishRun();
    }
  }

  function finishRun() {
    document.getElementById(stopBtn).style.display = none;
    isRunning = false;
    runBtn.disabled = false;
    runBtn.textContent = '▶ Run';
    setStatus('Ready', false);
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }
    // Check remaining
    checkFreeRemaining();
  }

  // ── Init ─────────────────────────────────────────
  // Check remaining on load
  checkFreeRemaining();
  setStatus('Ready', false);
</script>
</body>
</html>
