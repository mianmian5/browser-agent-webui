<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Browser Agent WebUI</title>
<style>
  :root {
    --bg: #0a0a10;
    --surface: #14141f;
    --surface-2: #1e1e32;
    --border: #2a2a45;
    --text: #e8e8f0;
    --text-sec: #7b7f9b;
    --accent: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --warning: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }
  header {
    padding: 0 1.5rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .logo span { color: var(--accent); }
  .status { font-size: 12px; color: var(--text-sec); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-sec); display: inline-block; }
  .status-dot.active { background: var(--green); animation: pulse 1.5s infinite; }
  .status-dot.warning { background: var(--warning); }
  .status-dot.error-dot { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .main { display: flex; flex: 1; overflow: hidden; }
  .viewport {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0;
  }
  .viewport-header {
    padding: 0.5rem 1rem; font-size: 11px;
    color: var(--text-sec); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
  }
  .viewport-url {
    flex: 1; padding: 4px 8px; border-radius: 4px;
    background: var(--surface-2); font-size: 11px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: "SF Mono", "JetBrains Mono", monospace;
  }
  .viewport-screen {
    flex: 1; position: relative; overflow: hidden;
    background: var(--surface-2);
  }
  .viewport-screen img {
    width: 100%; height: 100%; object-fit: contain;
    display: block; opacity: 0;
    transition: opacity 0.25s ease;
  }
  .viewport-screen img.loaded { opacity: 1; }
  .viewport-screen .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    color: var(--text-sec); font-size: 14px;
  }
  .viewport-screen .placeholder .big { font-size: 48px; }
  .viewport-screen .loading-overlay {
    position: absolute; bottom: 16px; right: 16px;
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none; z-index: 10;
  }
  .viewport-screen .loading-overlay.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .panel {
    width: 400px; display: flex; flex-direction: column;
    background: var(--surface);
  }
  .panel-tabs {
    display: flex; border-bottom: 1px solid var(--border);
  }
  .panel-tabs button {
    flex: 1; padding: 10px; border: none; background: transparent;
    color: var(--text-sec); cursor: pointer; font-size: 13px;
    font-family: inherit; transition: all 0.15s;
    border-bottom: 2px solid transparent;
  }
  .panel-tabs button:hover { color: var(--text); }
  .panel-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-content { flex: 1; overflow-y: auto; display: none; }
  .panel-content.active { display: block; }
  .input-area {
    padding: 1rem; border-bottom: 1px solid var(--border);
  }
  .input-area textarea {
    width: 100%; min-height: 80px; padding: 12px;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; resize: vertical;
    font-size: 13px; line-height: 1.5;
    font-family: inherit;
  }
  .input-area textarea:focus { outline: none; border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-sec); }
  .input-row {
    display: flex; gap: 8px; margin-top: 8px; align-items: center;
  }
  .input-row input, .input-row select {
    padding: 6px 10px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; font-family: inherit;
  }
  .input-row input:focus, .input-row select:focus { outline: none; border-color: var(--accent); }
  .input-row input { flex: 1; }
  .input-row select { width: 130px; }
  .run-btn {
    padding: 8px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: opacity 0.15s;
    font-family: inherit; white-space: nowrap;
  }
  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .run-btn.stop { background: var(--red); }
  .log-area { padding: 0.75rem; }
  .log-entry {
    padding: 8px 10px; margin-bottom: 6px;
    border-radius: 6px; font-size: 12px; line-height: 1.5;
    background: var(--surface-2); border-left: 3px solid var(--border);
    animation: fadeIn 0.2s ease;
  }
  .log-entry.log-think { border-left-color: var(--accent); }
  .log-entry.log-action { border-left-color: var(--warning); }
  .log-entry.log-error { border-left-color: var(--red); background: #2a1020; }
  .log-entry.log-result { border-left-color: var(--green); }
  .log-thought { color: var(--text); }
  .log-action-name { color: var(--warning); font-weight: 600; }
  .log-obs { color: var(--text-sec); margin-top: 4px; white-space: pre-wrap; word-break: break-all; }
  .log-result-text { color: var(--green); }
  .log-error-text { color: var(--red); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .clear-btn {
    padding: 4px 12px; background: transparent; border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-sec); cursor: pointer; font-size: 11px; font-family: inherit;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--text-sec); }
  .log-header { display: flex; justify-content: space-between; align-items: center; padding: 0 0.75rem 0.5rem; }
  .free-hint { font-size: 11px; color: var(--warning); }
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .panel { width: 100%; max-height: 50vh; }
    .viewport { min-height: 50vh; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🌐 <span>Browser Agent</span></div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">就绪</span>
      <span class="free-hint" id="freeHint"></span>
    </div>
  </header>
  <div class="main">
    <div class="viewport">
      <div class="viewport-header">
        <span>🌍</span>
        <span class="viewport-url" id="currentUrl">about:blank</span>
      </div>
      <div class="viewport-screen" id="viewportScreen">
        <div class="placeholder" id="placeholder">
          <div class="big">🌐</div>
          <div>输入任务，点击运行</div>
          <div style="font-size:11px">浏览器将自动执行操作</div>
        </div>
        <img id="screenshotImg" style="display:none" />
        <div class="loading-overlay" id="loadingOverlay"></div>
      </div>
    </div>
    <div class="panel">
      <div class="input-area">
        <textarea id="taskInput" rows="3" placeholder='例如：帮我搜索"2024年诺贝尔奖获得者"并整理成列表...'></textarea>
        <div class="input-row">
          <select id="modelSelect">
            <option value="deepseek-chat">DeepSeek</option>
            <option value="gpt-4o-mini">GPT-4o-mini</option>
            <option value="qwen-plus">通义千问+</option>
            <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
          </select>
          <input type="password" id="apiKey" placeholder="留空 = 免费试用" style="width:140px" />
          <button class="run-btn" id="runBtn" onclick="runTask()">▶ 运行</button>
        </div>
      </div>
      <div class="panel-tabs">
        <button class="active" onclick="switchTab('log')">📋 操作日志</button>
        <button onclick="switchTab('config')">⚙️ 配置</button>
      </div>
      <div class="panel-content active" id="logTab">
        <div class="log-header">
          <span id="logFreeHint" class="free-hint"></span>
          <button class="clear-btn" onclick="clearLog()">清空</button>
        </div>
        <div class="log-area" id="thinkingLog"></div>
      </div>
      <div class="panel-content" id="configTab" style="padding:1rem;font-size:12px;color:var(--text-sec)">
        <p>浏览器内核: Playwright (Chromium, headless)</p>
        <p>模型: <span id="configModel">DeepSeek</span></p>
        <p>搜索引擎: Bing + DuckDuckGo + 百度</p>
        <p>知识源: 百度百科 · 中文维基百科</p>
        <hr style="border-color:var(--border);margin:12px 0">
        <p>💡 提示</p>
        <p style="margin-top:6px">- 搜索类任务会先走搜索引擎，无需浏览器开网页</p>
        <p>- 如需登录操作需自行提供 API Key</p>
      </div>
    </div>
  </div>
</div>

<img id="screenshotPreload" style="display:none" />
<script>
const MODEL_BASE_URLS = {
  "deepseek-chat":      "https://api.deepseek.com/v1",
  "gpt-4o-mini":        "https://api.openai.com/v1",
  "gpt-4o":             "https://api.openai.com/v1",
  "claude-sonnet-4-20250514": "https://api.anthropic.com/v1",
  "qwen-plus":          "https://dashscope.aliyuncs.com/compatible-mode/v1",
};
const taskInput = document.getElementById("taskInput");
const runBtn = document.getElementById("runBtn");
const thinkingLog = document.getElementById("thinkingLog");
const currentUrl = document.getElementById("currentUrl");
const placeholder = document.getElementById("placeholder");
const screenshotImg = document.getElementById("screenshotImg");
const screenshotPreload = document.getElementById("screenshotPreload");
const loadingOverlay = document.getElementById("loadingOverlay");
const modelSelect = document.getElementById("modelSelect");
const apiKeyInput = document.getElementById("apiKey");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const freeHint = document.getElementById("freeHint");
const logFreeHint = document.getElementById("logFreeHint");
let eventSource = null;
let sessionId = null;
let isRunning = false;
let completed = false;
let freeRemaining = 5;
let lastScreenshot = "";

if (localStorage.getItem("baw_apiKey")) apiKeyInput.value = localStorage.getItem("baw_apiKey");
if (localStorage.getItem("baw_model")) modelSelect.value = localStorage.getItem("baw_model");
function saveConfig() {
  localStorage.setItem("baw_apiKey", apiKeyInput.value);
  localStorage.setItem("baw_model", modelSelect.value);
}
function setStatus(text, active) {
  statusText.textContent = text;
  statusDot.className = "status-dot" + (active ? " active" : "");
}
function updateFreeHint() {
  const hint = freeRemaining > 0 ? "\u{1F381}" + "免费试用剩余 " + freeRemaining + " 次" : "";
  freeHint.textContent = hint;
  logFreeHint.textContent = hint;
}
function switchTab(name) {
  document.querySelectorAll(".panel-tabs button").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".panel-content").forEach(p => p.classList.remove("active"));
  if (name === "log") {
    document.querySelectorAll(".panel-tabs button")[0].classList.add("active");
    document.getElementById("logTab").classList.add("active");
  } else {
    document.querySelectorAll(".panel-tabs button")[1].classList.add("active");
    document.getElementById("configTab").classList.add("active");
  }
  document.getElementById("configModel").textContent = modelSelect.options[modelSelect.selectedIndex].text;
}
modelSelect.onchange = function() {
  document.getElementById("configModel").textContent = modelSelect.options[modelSelect.selectedIndex].text;
};
function addLog(data) {
  const el = document.createElement("div");
  const t = data.type || "";
  const thought = data.thought || "";
  const action = data.action || "";
  const obs = data.observation || "";
  let cls = "log-entry";
  if (t === "error") cls += " log-error";
  else if (action === "done") cls += " log-result";
  else if (thought && !action) cls += " log-think";
  let html = "";
  if (thought) html += '<div class="log-thought">' + thought + '</div>';
  if (action) html += '<div class="log-action-name">\u{1F527} ' + action + ' ' + JSON.stringify(data.params || {}) + '</div>';
  if (obs) {
    if (action === "done") html += '<div class="log-result-text">' + obs + '</div>';
    else if (t === "error") html += '<div class="log-error-text">' + obs + '</div>';
    else html += '<div class="log-obs">' + obs.substring(0, 500) + '</div>';
  }
  el.className = cls;
  el.innerHTML = html;
  thinkingLog.appendChild(el);
  el.scrollIntoView({ behavior: "smooth", block: "end" });
}
function clearLog() { thinkingLog.innerHTML = ""; }

function updateScreenshot(base64Data) {
  if (!base64Data) return;
  if (base64Data === lastScreenshot) return;
  lastScreenshot = base64Data;
  screenshotPreload.onload = function() {
    screenshotImg.src = screenshotPreload.src;
    screenshotImg.style.display = "block";
    screenshotImg.classList.add("loaded");
    placeholder.style.display = "none";
  };
  screenshotPreload.src = "data:image/png;base64," + base64Data;
}

async function runTask() {
  const task = taskInput.value.trim();
  if (!task || isRunning) return;
  saveConfig();
  const apiKey = apiKeyInput.value.trim();
  clearLog();
  placeholder.style.display = "flex";
  screenshotImg.style.display = "none";
  screenshotImg.classList.remove("loaded");
  currentUrl.textContent = "starting...";
  lastScreenshot = "";
  isRunning = true;
  runBtn.disabled = true;
  runBtn.textContent = "\u23F3 Running...";
  setStatus("Running...", true);
  try {
    const model = modelSelect.value;
    const baseUrl = MODEL_BASE_URLS[model] || "https://api.deepseek.com/v1";
    const startRes = await fetch("/browser-agent/api/start", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ task: task, api_key: apiKey, base_url: baseUrl, model: model, headless: true }),
    });
    if (!startRes.ok) {
      let errMsg = "请求失败";
      try { const errData = await startRes.json(); errMsg = typeof errData.detail === "object" ? (errData.detail.message || JSON.stringify(errData.detail)) : (errData.detail || errMsg); } catch(e) { errMsg = "\u670D\u52A1\u5668\u9519\u8BEF (" + startRes.status + ")"; }
      addLog({ type: "error", thought: errMsg }); finishRun(); return;
    }
    const startData = await startRes.json();
    sessionId = startData.session_id;
    if (startData.remaining_free !== undefined) { freeRemaining = startData.remaining_free; updateFreeHint(); }
    addLog({ thought: '\u{1F4AC} \u4EFB\u52A1\u5DF2\u542F\u52A8: "' + task + '"' });
    setStatus("Running...", true);
    eventSource = new EventSource("/browser-agent/api/stream/" + sessionId);
    eventSource.onmessage = function(event) {
      let data;
      try { data = JSON.parse(event.data); } catch(e) { return; }
      if (data.type === "done") { completed = true; finishRun(); return; }
      if (data.type === "error") { addLog({ type: "error", thought: data.content || "\u672A\u77E5\u9519\u8BEF" }); return; }
      if (data.screenshot) {
        loadingOverlay.classList.remove("active");
        updateScreenshot(data.screenshot);
      } else {
        loadingOverlay.classList.add("active");
      }
      if (data.observation && data.observation.startsWith("\u5DF2\u5BFC\u822A\u5230:")) {
        currentUrl.textContent = data.observation.replace("\u5DF2\u5BFC\u822A\u5230: ", "");
      }
      addLog(data);
      if (data.done) { completed = true; addLog({ thought: "\u2705 " + (data.observation || "\u4EFB\u52A1\u5B8C\u6210\uFF01") }); finishRun(); }
    };
eventSource.onerror = function() {      if (completed) return;      addLog({ thought: "\u26A0\uFE0F \u8FDE\u63A5\u5DF2\u65AD\u5F00" });      completed = true;      finishRun();    }
        }
      }, 5000);
    };
  } catch(e) {
    addLog({ type: "error", thought: "\u8BF7\u6C42\u51FA\u9519: " + e.message });
    finishRun();
  }
}
function finishRun() {
  completed = true;
  isRunning = false; runBtn.disabled = false; runBtn.textContent = "\u25B6 \u8FD0\u884C";
  loadingOverlay.classList.remove("active");
  if (eventSource) { eventSource.close(); eventSource = null; }
  if (sessionId) { fetch("/browser-agent/api/stop/" + sessionId, { method: "POST" }).catch(function(){}); sessionId = null; }
  setStatus("\u5C31\u7EEA", false);
}
runBtn.addEventListener("click", function() {
  if (isRunning) {
    if (eventSource) eventSource.close();
    if (sessionId) { fetch("/browser-agent/api/stop/" + sessionId, { method: "POST" }).catch(function(){}); }
    finishRun();
    addLog({ thought: "\u23F9\uFE0F \u7528\u6237\u624B\u52A8\u505C\u6B62" });
  } else { runTask(); }
});
taskInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); runTask(); }
});
updateFreeHint();
</script>
</body>
</html>
